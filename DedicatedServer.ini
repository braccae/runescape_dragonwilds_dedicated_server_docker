[SectionsToSave]
bCanSaveAllSections=true

[/Script/Dominion.DedicatedServerSettings]
; EOS ID of the user who owns the server
OwnerId=${OwnerId}

; password applied when a map is loaded (unprotected if empty)
; WorldPassword=123abc
WorldPassword=${WorldPassword}

; password used to grant access to the server management screen
; AdminPassword=123abc
AdminPassword=${AdminPassword}

; name displayed for the server
; ServerName=MyServer1234
ServerName=${ServerName}
; name displayed for the world save
; DefaultWorldName=MyWorld1234
DefaultWorldName=${DefaultWorldName}


; AUTO-GENERATED
ServerGuid=${ServerGuid}